<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bye</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        /* Menu Styling */
        #menu {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 10, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            color: white;
        }

        h1 {
            font-size: 5rem;
            text-transform: uppercase;
            letter-spacing: 10px;
            color: #8b0000;
            text-shadow: 2px 2px 10px rgba(255,0,0,0.5);
            margin-bottom: 50px;
        }

        .mode-btn {
            background: #222;
            color: #fff;
            border: 2px solid #555;
            padding: 15px 40px;
            margin: 10px;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .mode-btn:hover {
            background: #555;
            border-color: #fff;
        }

        /* HUD Styling */
        #hud {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }

        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 24px;
        }

        /* Realistic Health Bar */
        #health-container {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 300px;
            height: 25px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #333;
            box-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        #health-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #8b0000, #ff0000);
            transition: width 0.2s ease-out;
        }

        /* Procedural Pistol Overlay */
        #weapon-container {
            position: absolute;
            bottom: -50px;
            right: 15%;
            width: 300px;
            height: 400px;
            transition: transform 0.1s;
        }

        /* Creating a pistol shape using SVG */
        .svg-pistol {
            width: 100%;
            height: 100%;
            fill: #2a2a2a;
            stroke: #111;
            stroke-width: 2;
            filter: drop-shadow(5px 5px 15px rgba(0,0,0,0.8));
        }
    </style>
</head>
<body>

    <!-- Main Menu -->
    <div id="menu">
        <h1>bye</h1>
        <button class="mode-btn" id="btn-zombies">Zombie Horde</button>
        <button class="mode-btn" id="btn-humans">Human War</button>
    </div>

    <!-- Heads Up Display -->
    <div id="hud">
        <div id="crosshair">+</div>
        <div id="health-container">
            <div id="health-fill"></div>
        </div>
        <div id="weapon-container">
            <svg class="svg-pistol" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <!-- Slide -->
                <rect x="20" y="20" width="70" height="15" rx="2" fill="#1a1a1a"/>
                <!-- Barrel detail -->
                <rect x="80" y="22" width="15" height="11" fill="#000"/>
                <!-- Grip -->
                <polygon points="25,35 40,35 30,80 15,75" fill="#333"/>
                <!-- Trigger Guard -->
                <path d="M 40 35 Q 50 35 45 45 L 35 45" fill="none" stroke="#1a1a1a" stroke-width="3"/>
                <!-- Trigger -->
                <line x1="38" y1="35" x2="35" y2="42" stroke="#000" stroke-width="2"/>
            </svg>
        </div>
    </div>

    <!-- Three.js and PointerLockControls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        // Game Variables
        let camera, scene, renderer, controls;
        let enemies = [];
        let raycaster = new THREE.Raycaster();
        let gameActive = false;
        let currentMode = '';
        let health = 100;

        // UI Elements
        const menu = document.getElementById('menu');
        const hud = document.getElementById('hud');
        const weapon = document.getElementById('weapon-container');
        const healthFill = document.getElementById('health-fill');

        init();
        animate();

        function init() {
            // Scene Setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);
            scene.fog = new THREE.Fog(0x0a0a0a, 0, 50);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = 2;

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 20, 10);
            scene.add(directionalLight);

            // Ground
            const floorGeo = new THREE.PlaneGeometry(200, 200);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Controls
            controls = new THREE.PointerLockControls(camera, document.body);

            // Menu Logic
            document.getElementById('btn-zombies').addEventListener('click', () => startGame('zombies'));
            document.getElementById('btn-humans').addEventListener('click', () => startGame('humans'));

            // Shooting Logic
            document.addEventListener('mousedown', shoot);

            window.addEventListener('resize', onWindowResize, false);
        }

        function startGame(mode) {
            currentMode = mode;
            menu.style.display = 'none';
            hud.style.display = 'block';
            controls.lock();
            gameActive = true;

            // Clear old enemies
            enemies.forEach(e => scene.remove(e));
            enemies = [];

            // Adjust environment based on mode
            if (mode === 'zombies') {
                scene.background = new THREE.Color(0x050505);
                scene.fog.color.setHex(0x050505);
                scene.fog.far = 30; // Spooky dense fog
            } else {
                scene.background = new THREE.Color(0x87CEEB); // Sky blue
                scene.fog.color.setHex(0x87CEEB);
                scene.fog.far = 100; // Clearer vision
            }

            // Spawn initial wave
            for(let i=0; i<10; i++) spawnEnemy();
        }

        function spawnEnemy() {
            // Basic enemy mesh (replace with 3D models later)
            const geometry = new THREE.BoxGeometry(1, 2, 1);
            const color = currentMode === 'zombies' ? 0x004400 : 0x444444; // Green for zombies, grey for soldiers
            const material = new THREE.MeshStandardMaterial({ color: color });
            const enemy = new THREE.Mesh(geometry, material);

            // Random position away from player
            const angle = Math.random() * Math.PI * 2;
            const radius = 20 + Math.random() * 20;
            enemy.position.x = Math.cos(angle) * radius;
            enemy.position.z = Math.sin(angle) * radius;
            enemy.position.y = 1;

            scene.add(enemy);
            enemies.push(enemy);
        }

        function shoot(event) {
            if (!gameActive || event.button !== 0) return;

            // Gun recoil animation
            weapon.style.transform = "translateY(20px) rotate(5deg)";
            setTimeout(() => weapon.style.transform = "translateY(0) rotate(0)", 100);

            // Raycast for hits
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(enemies);

            if (intersects.length > 0) {
                const hitEnemy = intersects[0].object;
                scene.remove(hitEnemy);
                enemies = enemies.filter(e => e !== hitEnemy);
                spawnEnemy(); // Spawn a new one to keep the horde coming
            }
        }

        function updateEnemies() {
            // Simple follow AI
            const speed = currentMode === 'zombies' ? 0.02 : 0.05;
            enemies.forEach(enemy => {
                enemy.lookAt(camera.position);
                enemy.position.add(enemy.getWorldDirection(new THREE.Vector3()).multiplyScalar(speed));
                
                // Basic damage logic
                if (enemy.position.distanceTo(camera.position) < 2) {
                    health -= 0.5;
                    healthFill.style.width = Math.max(0, health) + '%';
                    if(health <= 0) {
                        gameActive = false;
                        controls.unlock();
                        menu.style.display = 'flex';
                        hud.style.display = 'none';
                        health = 100;
                        healthFill.style.width = '100%';
                    }
                }
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (gameActive) {
                updateEnemies();
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
